<!DOCTYPE html>
<html lang="en">
<head>
    <title>Process Lab Test</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 30px; }
        .container { background: white; padding: 30px; border-radius: 8px; max-width: 600px; margin: auto; }
        textarea { width: 100%; height: 150px; padding: 10px; margin-top: 10px; margin-bottom: 20px; box-sizing: border-box; }
        .btn-submit { background: #2ecc71; color: white; padding: 12px; border: none; width: 100%; cursor: pointer; border-radius: 4px;}
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color: #e67e22;">Test: {{ report.lab_test.test_name }}</h2>
        <p><strong>Patient:</strong> {{ report.patient.get_full_name }}</p>
        
        <form method="POST">
            {% csrf_token %}
            <label><strong>Clinical Findings / Result Data</strong></label>
            <textarea name="result_data" placeholder="Enter specific markers, counts, or radiology findings here..." required></textarea>
            <button type="submit" class="btn-submit">Sign & Complete Test</button>
        </form>
    </div>
</body>
</html>
