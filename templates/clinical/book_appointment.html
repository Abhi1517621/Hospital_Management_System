<!DOCTYPE html>
<html lang="en">
<head>
    <title>Book Appointment</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 30px; }
        .container { background: white; padding: 30px; border-radius: 8px; max-width: 500px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 20px; box-sizing: border-box; }
        button { background: #2ecc71; color: white; padding: 12px; border: none; width: 100%; cursor: pointer; border-radius: 4px;}
    </style>
</head>
<body>
    <div class="container">
        <h2>Schedule a Visit</h2>
        <form method="POST">
            {% csrf_token %}
            
            <label>Select Doctor</label>
            <select name="doctor_id" required>
                <option value="" disabled selected>-- Choose a Specialist --</option>
                {% for doc in doctors %}
                    <option value="{{ doc.id }}">Dr. {{ doc.get_full_name }} ({{ doc.staff_profile.specialization }})</option>
                {% endfor %}
            </select>

            <div style="margin-bottom: 20px;">
                <label><strong>Select Date and Time</strong></label>
                <input 
                    type="datetime-local" 
                    name="scheduled_time" 
                    required 
                    style="width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box;"
                    min="{{ min_datetime }}" 
                    max="{{ max_datetime }}"
                >
                <p style="font-size: 12px; color: gray; margin-top: 5px;">
                    *Appointments can only be booked for today or the next 3 days.
                </p>
            </div>

            <label>Reason for Visit</label>
            <textarea name="notes" rows="3" placeholder="Briefly describe your symptoms..."></textarea>
            
            <button type="submit">Confirm Booking</button>
        </form>
    </div>
</body>
</html>
